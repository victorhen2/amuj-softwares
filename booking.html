    <div class="logo">
      <a href="/"><img src="images/logo.png" alt="Amuj Graphics Design Logo"></a>

      <ul>

        <li class="login-signup"><a href="login.html">Login/Sign Up</a></li>
      </ul>
    </nav>

  <main class="booking-page">
    <section class="hero-secondary">
      <div class="container">
        <h1>Request a Booking</h1>
        <p>Please fill out the form below to request a booking for our services.</p>
      </div>
    </section>
  
    <section class="booking-form-section">
      <div class="container">
        <form id="bookingForm" action="#" method="POST">
          <div class="form-group">
            <label for="name">Your Name:</label>
            <input type="text" id="name" name="name" required>
          </div>
  
          <div class="form-group">
            <label for="email">Your Email:</label>
            <input type="email" id="email" name="email" required>
          </div>
  
          <div class="form-group">
            <label for="phone">Phone Number:</label>
            <input type="tel" id="phone" name="phone">
          </div>
  
          <div class="form-group">
            <label for="service">Select Service:</label>
            <select id="service" name="service" required>
              <option value="">-- Please Select --</option>
              <option value="logo-design">Logo Design</option>
              <option value="website-development">Website Development</option>
              <option value="branding">Branding</option>
              {/* Add more services based on your offerings */}
            </select>
          </div>
  
          <div class="form-group">
            <label for="budget">Estimated Budget (Ksh):</label>
            <input type="number" id="budget" name="budget" min="0">
          </div>
  
          <div class="form-group">
            <label for="details">Project Details:</label>
            <textarea id="details" name="details" rows="5" placeholder="Please provide a brief description of your project requirements." required></textarea>
          </div>
  
          <div class="form-group">
            <label for="timeline">Preferred Timeline:</label>
            <input type="text" id="timeline" name="timeline" placeholder="e.g., Within 1 month, 2-3 months, etc.">
          </div>
  
          <button type="submit" class="button">Submit Booking Request</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    
    <p>&copy; 2025 Amuj Graphics Design & Web Design. All rights reserved.</p>

  </footer>

</body>
</html>
